<template>
    <lightning-card title="Resource Search" icon-name="custom:custom63">
        <!-- Search Form -->
        <div if:true={showSearchForm} class="slds-p-around_medium">
            <div class="slds-text-heading_medium slds-m-bottom_small">
                Search for  Resources
            </div>
            <p class="slds-m-bottom_medium">Enter search criteria to find resources.</p>
            
            <lightning-layout multiple-rows>
                <lightning-layout-item size="12" medium-device-size="6" class="slds-p-horizontal_x-small">
                    <lightning-input
                        label="Resource Name"
                        value={resourceName}
                        onchange={handleResourceNameChange}
                        placeholder="Enter resource name">
                    </lightning-input>
                </lightning-layout-item>
                
                 <!-- <lightning-layout-item size="12" medium-device-size="6" class="slds-p-horizontal_x-small">
                    <lightning-input
                        label="Resource Type"
                        value={resourceType}
                        onchange={handleResourceTypeChange}
                        placeholder="Enter resource type">
                    </lightning-input>
                </lightning-layout-item>  -->
                
                <!-- <lightning-layout-item size="12" medium-device-size="6" class="slds-p-horizontal_x-small">
                    <lightning-input
                        label="Supplier Email"
                        value={supplierEmail}
                        onchange={handleSupplierEmailChange}
                        type="email"
                        placeholder="Enter supplier email">
                    </lightning-input>
                </lightning-layout-item> -->
            </lightning-layout> 
            
            <div class="slds-m-top_medium">
                <lightning-button
                    variant="brand"
                    label="Search"
                    onclick={handleSearch}
                    disabled={isSearching}
                    class="slds-m-right_small">
                </lightning-button>
                <lightning-spinner
                    if:true={isSearching}
                    alternative-text="Searching..."
                    size="small">
                </lightning-spinner>
            </div>
        </div>

        <!-- Results Screen -->
        <div if:true={showResults} class="slds-p-around_medium">
            <div class="slds-text-heading_medium slds-m-bottom_medium">
                 Resource Search Results
            </div>
           <!-- onrow action added -->  
            <lightning-datatable
                key-field="Id"
                data={resources}
                columns={columns}
                hide-checkbox-column="true"
                onrowaction={handleRowAction}>
            </lightning-datatable>
            
            <div class="slds-m-top_medium">
                <lightning-button
                    variant="neutral"
                    label="Back"
                    onclick={handleBack}
                    class="slds-m-right_small">
                </lightning-button>
                <lightning-button
                    variant="brand"
                    label="New Search"
                    onclick={handleNewSearch}>
                </lightning-button>
            </div>
            
            <p class="slds-m-top_medium slds-text-color_weak">
                Click on any resource name to view the resource details.
            </p>
        </div>

        <!-- No Results Screen -->
        <div if:true={showNoResults} class="slds-p-around_medium">
            <div class="slds-text-heading_medium slds-m-bottom_small">
                No Resources Found
            </div>
            <p class="slds-m-bottom_medium">
                No resources match your search criteria. Please try again with different search terms.
            </p>
            
            <div>
                <lightning-button
                    variant="neutral"
                    label="Back"
                    onclick={handleBack}
                    class="slds-m-right_small">
                </lightning-button>
                <lightning-button
                    variant="brand"
                    label="New Search"
                    onclick={handleNewSearch}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
